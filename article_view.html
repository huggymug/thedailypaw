<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Daily Paw | Viewer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Georgia', serif; background: #3b3b3b; margin: 0; padding: 10px; padding-top: 65px; }
        .nav-header { position: fixed; top: 0; left: 0; right: 0; background: #000080; padding: 10px; display: flex; justify-content: space-between; align-items: center; z-index: 100; border-bottom: 2px solid #fff; }
        .win-btn { background: #d4d0c8; border: 2px solid #fff; border-right: 2px solid #404040; border-bottom: 2px solid #404040; padding: 8px 15px; cursor: pointer; font-weight: bold; text-decoration: none; color: black; font-size: 0.8rem; }
        .paper { max-width: 600px; margin: auto; background: white; padding: 25px; border: 1px solid #ccc; box-shadow: 10px 10px 0px #000; box-sizing: border-box; }
        h1 { border-bottom: 3px solid black; padding-bottom: 10px; margin-top: 0; }
        img { width: 100%; border: 1px solid #000; margin-bottom: 15px; }
        .comment-box { background: #f0f0f0; border-left: 4px solid #000080; padding: 10px; margin-top: 10px; position: relative; font-family: sans-serif; }
        .del-com { color: red; cursor: pointer; font-size: 0.7rem; float: right; }
        textarea { width: 100%; height: 60px; border: 2px inset #fff; padding: 5px; margin-top: 10px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="nav-header">
    <a href="index.html" class="win-btn">< BACK</a>
    <span style="color:white; font-weight:bold;">ARCHIVE_VIEW</span>
</div>

<div id="article-container">
    <div class="paper">Loading Archive...</div>
</div>

<script>
    const _supabase = supabase.createClient('https://wemdedhwtlirdevkplch.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndlbWRlZGh3dGxpcmRldmtwbGNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMzE5MTgsImV4cCI6MjA5MjcwNzkxOH0.fh8S3ocN9vF7orCENvYk-eD1bCFXBkhvFVOpaE32q3o');
    const artId = new URLSearchParams(window.location.search).get('id');
    let currentUser = null;
    let userRank = 'user';

    async function loadData() {
        const { data: { session } } = await _supabase.auth.getSession();
        if (session) {
            currentUser = session.user;
            const { data: profile } = await _supabase.from('profiles').select('rank').eq('id', currentUser.id).single();
            userRank = profile?.rank || 'user';
        }

        const { data: art } = await _supabase.from('articles').select('*, profiles(username)').eq('id', artId).single();
        if (art) {
            document.getElementById('article-container').innerHTML = `
                <div class="paper">
                    <small>${art.date}</small> | By: <a href="profile.html?id=${art.user_id}">${art.profiles?.username || 'User'}</a>
                    <h1>${art.title}</h1>
                    ${art.image_url ? `<img src="${art.image_url}">` : ''}
                    <div style="white-space: pre-wrap;">${art.content}</div>
                    <hr>
                    <h3>Responses</h3>
                    <div id="comment-list"></div>
                    <textarea id="comment-input" placeholder="Write a response..."></textarea>
                    <button class="win-btn" style="background:#2ecc71; color:white; width:100%; margin-top:5px;" onclick="sendComment()">POST RESPONSE</button>
                </div>`;
            loadComments();
        }
    }

    async function loadComments() {
        const { data: comments } = await _supabase.from('comments').select('*, profiles(username)').eq('article_id', artId);
        let html = "";
        comments?.forEach(c => {
            const canDel = (currentUser && currentUser.id === c.user_id) || userRank === 'admin';
            const delBtn = canDel ? `<span class="del-com" onclick="deleteComment('${c.id}')">[DELETE]</span>` : '';
            html += `<div class="comment-box">${delBtn}<strong>${c.profiles?.username || 'Guest'}</strong>: ${c.body}</div>`;
        });
        document.getElementById('comment-list').innerHTML = html || "<p>No responses yet.</p>";
    }

    async function sendComment() {
        const txt = document.getElementById('comment-input').value;
        if (!currentUser || !txt) return alert("Log in to comment!");
        await _supabase.from('comments').insert([{ article_id: artId, user_id: currentUser.id, body: txt }]);
        document.getElementById('comment-input').value = "";
        loadComments();
    }

    async function deleteComment(id) {
        if (confirm("Delete response?")) {
            await _supabase.from('comments').delete().eq('id', id);
            loadComments();
        }
    }

    loadData();
</script>
</body>
</html>
