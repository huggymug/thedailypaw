<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Daily Paw | Archive Viewer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="icon" type="image/png" href="tdp.png">
    <style>
        :root { --win-gray: #d4d0c8; --win-blue: #000080; }
        body { font-family: 'Georgia', serif; background: #3b3b3b; margin: 0; padding: 10px; padding-top: 65px; color: #2c3e50; }
        
        /* Nav Header */
        .nav-header { position: fixed; top: 0; left: 0; right: 0; background: var(--win-blue); padding: 10px; display: flex; justify-content: space-between; align-items: center; z-index: 100; border-bottom: 2px solid #fff; }
        .win-btn { background: var(--win-gray); border: 2px solid #fff; border-right: 2px solid #404040; border-bottom: 2px solid #404040; padding: 8px 15px; cursor: pointer; font-weight: bold; font-family: sans-serif; text-decoration: none; color: black; display: inline-block; font-size: 0.8rem; }
        
        /* Article Styles */
        .paper { max-width: 600px; margin: auto; background: white; padding: 25px; border: 1px solid #ccc; box-shadow: 10px 10px 0px #000; box-sizing: border-box; margin-bottom: 20px; }
        h1 { border-bottom: 3px solid black; padding-bottom: 10px; margin-top: 0; font-size: 1.8rem; }
        img { width: 100%; border: 1px solid #000; margin-bottom: 15px; display: block; height: auto; }
        
        /* Comment Styles */
        .comment-box { background: #f0f0f0; border: 1px inset #fff; padding: 10px; margin-top: 10px; font-family: sans-serif; font-size: 0.9rem; border-left: 4px solid var(--win-blue); }
        .author-link { color: var(--win-blue); text-decoration: underline; font-family: sans-serif; font-weight: bold; }
        .comment-form { margin-top: 20px; padding: 15px; background: #e0e0e0; border: 2px solid #000; }
        textarea { width: 100%; height: 60px; border: 2px inset #fff; padding: 5px; box-sizing: border-box; font-family: sans-serif; resize: none; }
        
        /* Auth Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; display: none; justify-content: center; align-items: center; }
        .login-window { background: var(--win-gray); border: 2px solid #fff; border-right: 2px solid #404040; border-bottom: 2px solid #404040; padding: 20px; width: 280px; color: black; }
    </style>
</head>
<body>

<div id="loginModal" class="modal-overlay">
    <div class="login-window">
        <div style="background:var(--win-blue); color:white; padding:5px; font-weight:bold; margin-bottom:15px;">[ SIGN_IN.EXE ]</div>
        <input type="email" id="auth-email" placeholder="Email" style="width:90%; margin-bottom:10px; padding:5px;">
        <input type="password" id="auth-password" placeholder="Password" style="width:90%; margin-bottom:10px; padding:5px;">
        <div style="display:flex; gap:5px;">
            <button class="win-btn" onclick="handleAuth('login')">LOGIN</button>
            <button class="win-btn" onclick="handleAuth('signup')">SIGN UP</button>
        </div>
        <button class="win-btn" onclick="document.getElementById('loginModal').style.display='none'" style="margin-top:10px; width:100%;">CLOSE</button>
    </div>
</div>

<div class="nav-header">
    <a href="index.html" class="win-btn">< BACK</a>
    <div id="auth-status">
        <button class="win-btn" onclick="document.getElementById('loginModal').style.display='flex'">LOGIN</button>
    </div>
</div>

<div id="article-container">
    <div class="paper">Retrieving data from archive...</div>
</div>

<script>
    const _supabase = supabase.createClient('https://wemdedhwtlirdevkplch.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndlbWRlZGh3dGxpcmRldmtwbGNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMzE5MTgsImV4cCI6MjA5MjcwNzkxOH0.fh8S3ocN9vF7orCENvYk-eD1bCFXBkhvFVOpaE32q3o');
    let currentArtId = null;

    async function checkUser() {
        const { data: { session } } = await _supabase.auth.getSession();
        if (session) {
            document.getElementById('auth-status').innerHTML = `<span style="color:white; font-family:sans-serif; font-size:0.8rem; margin-right:10px;">User: ${session.user.email}</span>`;
        }
    }

    async function handleAuth(type) {
        const email = document.getElementById('auth-email').value;
        const password = document.getElementById('auth-password').value;
        const { error } = (type === 'login') 
            ? await _supabase.auth.signInWithPassword({ email, password })
            : await _supabase.auth.signUp({ email, password });
        if (error) alert(error.message);
        else location.reload();
    }

    async function loadPage() {
        const params = new URLSearchParams(window.location.search);
        currentArtId = params.get('id');
        if (!currentArtId) return;

        try {
            const { data: art, error: artErr } = await _supabase.from('articles').select('*, profiles(username, rank)').eq('id', currentArtId).single();
            if (artErr) throw artErr;

            const authorName = art.profiles?.username || "Legacy User";
            const badge = art.profiles?.rank === 'admin' ? ' ☑' : '';

            document.getElementById('article-container').innerHTML = `
                <div class="paper">
                    <small>${art.date || ''}</small> | By: <a href="profile.html?id=${art.user_id}" class="author-link">${authorName}${badge}</a>
                    <h1>${art.title}</h1>
                    ${art.image_url ? `<img src="${art.image_url}">` : ''}
                    <div style="white-space: pre-wrap;">${art.body || art.content}</div>
                    <hr style="margin-top:30px; border: 1px dashed #ccc;">
                    <h3>Responses</h3>
                    <div id="comment-list">Loading...</div>
                    <div class="comment-form">
                        <textarea id="comment-input" placeholder="Type your response..."></textarea>
                        <button class="win-btn" style="margin-top:10px; background:#2ecc71; color:white;" onclick="sendComment()">SEND RESPONSE</button>
                    </div>
                </div>`;
            loadComments();
        } catch (e) { 
            document.getElementById('article-container').innerHTML = `<div class="paper">Error: ${e.message}</div>`; 
        }
    }

    async function loadComments() {
        const { data: comments, error } = await _supabase.from('comments').select('*, profiles(username, rank)').eq('article_id', currentArtId).order('created_at', { ascending: true });
        if (error) return;

        let comHtml = comments.length === 0 ? "<p>No responses yet.</p>" : "";
        comments.forEach(c => {
            const cUser = c.profiles?.username || "Guest";
            const cBadge = c.profiles?.rank === 'admin' ? ' ☑' : '';
            // Using 'body' for comment text
            const finalContent = c.body || "Empty response";
            comHtml += `<div class="comment-box"><strong>${cUser}${cBadge}</strong>: ${finalContent}</div>`;
        });
        document.getElementById('comment-list').innerHTML = comHtml;
    }

    async function sendComment() {
        const val = document.getElementById('comment-input').value;
        if (!val) return;
        const { data: { user } } = await _supabase.auth.getUser();
        
        if (!user) { 
            document.getElementById('loginModal').style.display = 'flex';
            return; 
        }

        const { error } = await _supabase.from('comments').insert([
            { article_id: currentArtId, user_id: user.id, body: val }
        ]);

        if (error) { 
            alert("Error: " + error.message); 
        } else {
            document.getElementById('comment-input').value = "";
            loadComments();
        }
    }

    checkUser();
    loadPage();
</script>
</body>
</html>
