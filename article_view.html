<!DOCTYPE html>
<html>
<head>
    <title>The Daily Paw | View</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Georgia', serif; background: #3b3b3b; margin: 0; padding: 20px; color: #2c3e50; }
        .win-btn { background: #d4d0c8; border: 2px solid #fff; border-right: 2px solid #404040; border-bottom: 2px solid #404040; padding: 8px 15px; cursor: pointer; font-weight: bold; font-family: sans-serif; text-decoration: none; color: black; display: inline-block; }
        .paper { max-width: 600px; margin: auto; background: white; padding: 30px; border: 1px solid #ccc; box-shadow: 10px 10px 0px #000; }
        h1 { border-bottom: 3px solid black; padding-bottom: 10px; margin-top: 0; }
        img { width: 100%; border: 1px solid #000; margin-bottom: 15px; }
        #auth-box { background: #eee; padding: 15px; border: 1px solid #ccc; margin-top: 20px; font-family: sans-serif; }
        input, textarea { width: 100%; padding: 8px; margin-bottom: 10px; border: 2px inset #fff; box-sizing: border-box; }
    </style>
</head>
<body>

    <div style="max-width: 600px; margin: auto; margin-bottom: 15px;">
        <a href="index.html" class="win-btn">< BACK</a>
    </div>

    <div id="article-content">
        <div class="paper">Loading article...</div>
    </div>

    <div class="paper" style="margin-top: 20px;">
        <h3 style="font-family: sans-serif;">COMMENTS</h3>
        <div id="comment-list" style="font-family: sans-serif;"></div>

        <div id="auth-box">
            <div id="auth-title"><b>SIGN IN TO COMMENT</b></div>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Password">
            <div id="login-tools">
                <button class="win-btn" style="width:100%;" onclick="handleAuth('login')">LOGIN</button>
                <p style="font-size:0.7rem; text-align:center;">No account? <a href="#" onclick="toggleAuth(true)">Sign Up</a></p>
            </div>
            <div id="signup-tools" style="display:none;">
                <button class="win-btn" style="width:100%; background:#3498db; color:white;" onclick="handleAuth('signup')">CREATE ACCOUNT</button>
                <p style="font-size:0.7rem; text-align:center;"><a href="#" onclick="toggleAuth(false)">Back to Login</a></p>
            </div>
        </div>

        <div id="comment-form" style="display:none; font-family: sans-serif;">
            <input type="text" id="c-user" readonly style="background:#ddd;">
            <textarea id="c-body" rows="3" placeholder="Write a reply..."></textarea>
            <button class="win-btn" style="width:100%;" onclick="postComment()">POST REPLY</button>
        </div>
    </div>

<script>
    const _supabase = supabase.createClient('https://wemdedhwtlirdevkplch.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndlbWRlZGh3dGxpcmRldmtwbGNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMzE5MTgsImV4cCI6MjA5MjcwNzkxOH0.fh8S3ocN9vF7orCENvYk-eD1bCFXBkhvFVOpaE32q3o');
    const artId = new URLSearchParams(window.location.search).get('id');

    function toggleAuth(isSignUp) {
        document.getElementById('auth-title').innerHTML = isSignUp ? "<b>CREATE ACCOUNT</b>" : "<b>SIGN IN TO COMMENT</b>";
        document.getElementById('login-tools').style.display = isSignUp ? 'none' : 'block';
        document.getElementById('signup-tools').style.display = isSignUp ? 'block' : 'none';
    }

    async function handleAuth(type) {
        const email = document.getElementById('email').value;
        const password = document.getElementById('pass').value;
        const { data, error } = type === 'login' ? 
            await _supabase.auth.signInWithPassword({ email, password }) : 
            await _supabase.auth.signUp({ email, password });

        if (error) alert(error.message);
        else if (type === 'login') {
            document.getElementById('auth-box').style.display = 'none';
            document.getElementById('comment-form').style.display = 'block';
            document.getElementById('c-user').value = email.split('@')[0];
        } else alert("Account created! You can now log in.");
    }

    async function loadArticle() {
        if (!artId) return;
        let { data: art } = await _supabase.from('articles').select('*').eq('id', artId).single();
        if (art) {
            document.getElementById('article-content').innerHTML = `
                <div class="paper">
                    <small>${art.date}</small>
                    <h1>${art.title}</h1>
                    <img src="${art.image_url}">
                    <p style="white-space: pre-wrap;">${art.content}</p>
                </div>`;
        }
        loadComments();
    }

    async function loadComments() {
        const list = document.getElementById('comment-list');
        let { data: comms } = await _supabase.from('comments').select('*').eq('article_id', artId).order('created_at', { ascending: true });
        list.innerHTML = comms && comms.length ? "" : "<p>No entries yet.</p>";
        if(comms) comms.forEach(c => {
            const d = document.createElement('div');
            d.style = "border-top:1px solid #eee; padding:10px 0;";
            d.innerHTML = `<b>${c.username}</b>: ${c.body}`;
            list.appendChild(d);
        });
    }

    async function postComment() {
        const user = document.getElementById('c-user').value;
        const body = document.getElementById('c-body').value;
        const { error } = await _supabase.from('comments').insert([{ article_id: artId, username: user, body: body }]);
        if (!error) { document.getElementById('c-body').value = ""; loadComments(); }
    }

    loadArticle();
</script>
</body>
</html>
