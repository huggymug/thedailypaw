<!DOCTYPE html>
<html>
<head>
    <title>The Daily Paw | Viewer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Georgia', serif; background: #3b3b3b; margin: 0; padding: 10px; padding-top: 65px; }
        .nav-header { position: fixed; top: 0; left: 0; right: 0; background: #000080; padding: 10px; display: flex; justify-content: space-between; z-index: 100; border-bottom: 2px solid #fff; }
        .win-btn { background: #d4d0c8; border: 2px solid #fff; border-right: 2px solid #404040; border-bottom: 2px solid #404040; padding: 5px 10px; cursor: pointer; text-decoration: none; color: black; font-size: 0.8rem; }
        .paper { max-width: 600px; margin: auto; background: white; padding: 25px; border: 1px solid #ccc; box-shadow: 10px 10px 0px #000; box-sizing: border-box; color: black; }
        .comment { background: #f0f0f0; border-left: 4px solid #000080; padding: 8px; margin-top: 10px; font-family: sans-serif; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="nav-header">
    <a href="index.html" class="win-btn">< BACK</a>
</div>

<div id="article-content"></div>

<script>
    const _supabase = supabase.createClient('https://wemdedhwtlirdevkplch.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndlbWRlZGh3dGxpcmRldmtwbGNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMzE5MTgsImV4cCI6MjA5MjcwNzkxOH0.fh8S3ocN9vF7orCENvYk-eD1bCFXBkhvFVOpaE32q3o');
    const artId = new URLSearchParams(window.location.search).get('id');
    let currentUser = null;

    async function load() {
        const { data: { session } } = await _supabase.auth.getSession();
        currentUser = session?.user;
        
        const { data: art } = await _supabase.from('articles').select('*, profiles(username)').eq('id', artId).single();
        if (art) {
            let html = `
                <div class="paper">
                    <small>${art.date} | By: <a href="profile.html?id=${art.user_id}">${art.profiles?.username || 'User'}</a></small>
                    <h1>${art.title}</h1>
                    ${art.image_url ? `<img src="${art.image_url}" style="width:100%; border:1px solid #000;">` : ''}
                    <div style="white-space: pre-wrap; margin-top:15px;">${art.content}</div>
                    <hr>
                    <h3>Responses</h3>
                    <div id="comment-list"></div>
                    ${currentUser ? `<textarea id="cInput" style="width:100%; height:50px; margin-top:10px;"></textarea><button class="win-btn" style="width:100%; margin-top:5px; background:#2ecc71; color:white;" onclick="postC()">REPLY</button>` : `<div style="background:#ffffcc; padding:5px; font-size:12px; border:1px solid #999;">Please <a href="login.html">Sign In</a> to respond.</div>`}
                </div>`;
            document.getElementById('article-content').innerHTML = html;
            loadC();
        }
    }

    async function loadC() {
        const { data: coms } = await _supabase.from('comments').select('*, profiles(username)').eq('article_id', artId);
        document.getElementById('comment-list').innerHTML = coms?.map(c => `<div class="comment"><strong>${c.profiles?.username || 'User'}</strong>: ${c.body}</div>`).join('') || "No responses.";
    }

    async function postC() {
        const val = document.getElementById('cInput').value;
        if (!val) return;
        await _supabase.from('comments').insert([{ article_id: artId, user_id: currentUser.id, body: val }]);
        document.getElementById('cInput').value = "";
        loadC();
    }

    load();
</script>
</body>
</html>
