<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Daily Paw | Profile</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="icon" type="image/png" href="tdp.png">
    <style>
        :root { --win-gray: #d4d0c8; --win-blue: #000080; }
        body { background: #3b3b3b; color: white; font-family: "Segoe UI", Arial; margin: 0; padding: 20px; padding-top: 65px; }
        .nav-header { position: fixed; top: 0; left: 0; right: 0; background: var(--win-blue); padding: 10px; display: flex; justify-content: space-between; z-index: 100; border-bottom: 2px solid #fff; }
        .win-window { background: var(--win-gray); color: black; border: 2px solid #fff; border-right: 2px solid #404040; border-bottom: 2px solid #404040; padding: 15px; max-width: 600px; margin: auto; }
        .win-title { background: var(--win-blue); color: white; padding: 4px; font-weight: bold; margin-bottom: 10px; }
        .win-btn { padding: 5px 12px; background: var(--win-gray); border: 2px solid #fff; border-right: 2px solid #404040; border-bottom: 2px solid #404040; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .pfp-img { width: 80px; height: 80px; background: #808080; border: 2px inset #fff; object-fit: cover; }
        #status-log { background: #000; color: #0f0; padding: 8px; font-family: monospace; font-size: 12px; margin-top: 15px; border: 2px inset #fff; min-height: 1.2em; white-space: pre-wrap; }
        .bio-box { background: #e0e0e0; padding: 10px; border: 1px solid #808080; margin-top: 10px; color: #333; font-style: italic; min-height: 40px; }
    </style>
</head>
<body>

<div class="nav-header">
    <a href="index.html" style="color:white; text-decoration:none; font-weight:bold;">< BACK</a>
    <span style="font-weight:bold; color:white;">USER_PROFILE.EXE</span>
</div>

<div class="win-window">
    <div class="win-title">Profile Record</div>
    
    <div id="profile-area">
        <div style="display: flex; gap: 15px; align-items: center;">
            <img id="pfp-display" src="https://github.com/huggymug/thedailypaw/blob/main/defaultprofile.png?raw=true" class="pfp-img">
            <div>
                <h2 id="username-display" style="margin:0;">Offline...</h2>
                <div id="rank-display" style="font-size:11px; font-weight:bold; color:var(--win-blue);"></div>
            </div>
        </div>

        <div id="bio-display" class="bio-box">Waiting for database response...</div>

        <div id="social-tools" style="display:none; margin-top:10px;">
            <button class="win-btn" onclick="openDM()">SEND MESSAGE</button>
        </div>
        
        <button id="edit-btn" class="win-btn" style="display:none;" onclick="alert('Editor disabled in preview')">EDIT PROFILE</button>
    </div>

    <div id="status-log">> Booting...</div>
</div>

<script>
    const SB_URL = 'https://wemdedhwtlirdevkplch.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndlbWRlZGh3dGxpcmRldmtwbGNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMzE5MTgsImV4cCI6MjA5MjcwNzkxOH0.fh8S3ocN9vF7orCENvYk-eD1bCFXBkhvFVOpaE32q3o';
    
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    function log(msg, isError = false) {
        const el = document.getElementById('status-log');
        el.innerText = "> " + msg;
        el.style.color = isError ? "#f55" : "#0f0";
    }

    async function init() {
        const urlParams = new URLSearchParams(window.location.search);
        const targetId = urlParams.get('id');

        if (!targetId) {
            log("FATAL: No 'id' in URL bar. Example: profile.html?id=123", true);
            return;
        }

        log("Connecting to Supabase...");

        try {
            // Fetch Profile
            const { data: profile, error } = await _supabase
                .from('profiles')
                .select('*')
                .eq('id', targetId)
                .single();

            if (error) {
                log("DB Error: " + error.message, true);
                return;
            }

            if (!profile) {
                log("Data returned NULL. Check your ID or RLS Policies.", true);
                return;
            }

            // Apply Data[cite: 1]
            document.getElementById('username-display').innerText = profile.username;
            document.getElementById('bio-display').innerText = profile.bio || "No bio information found.";
            document.getElementById('rank-display').innerText = profile.rank ? "[" + profile.rank.toUpperCase() + "]" : "[USER]";
            
            if (profile.avatar_url) {
                document.getElementById('pfp-display').src = profile.avatar_url;
            }

            // Check if viewer is user or admin[cite: 1]
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) {
                if (session.user.id === targetId) {
                    document.getElementById('edit-btn').style.display = 'block';
                } else {
                    document.getElementById('social-tools').style.display = 'block';
                }
            }
            log("Profile loaded successfully.");

        } catch (err) {
            log("System Error: " + err.message, true);
        }
    }

    function openDM() {
        const id = new URLSearchParams(window.location.search).get('id');
        window.location.href = `dm.html?to=${id}`;
    }

    init();
</script>
</body>
</html>
