<!DOCTYPE html>
<html>
<head>
    <title>The Daily Paw | Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="icon" type="image/png" href="tdp.png">
    <style>
        :root { --win-gray: #d4d0c8; --win-blue: #000080; }
        body { background: #3b3b3b; color: white; font-family: "Segoe UI", Arial; margin: 0; padding: 20px; padding-top: 65px; }
        .nav-header { position: fixed; top: 0; left: 0; right: 0; background: var(--win-blue); padding: 10px; display: flex; justify-content: space-between; z-index: 100; border-bottom: 2px solid #fff; }
        .win-window { background: var(--win-gray); color: black; border: 2px solid #fff; border-right: 2px solid #404040; border-bottom: 2px solid #404040; padding: 15px; max-width: 600px; margin: auto; }
        .win-title { background: var(--win-blue); color: white; padding: 4px; font-weight: bold; margin-bottom: 10px; font-size: 14px; }
        .win-btn { padding: 5px 12px; background: var(--win-gray); border: 2px solid #fff; border-right: 2px solid #404040; border-bottom: 2px solid #404040; cursor: pointer; font-weight: bold; font-family: inherit; margin-top: 5px; }
        .win-btn:active { border: 2px inset #fff; }
        input, textarea { padding: 5px; border: 2px inset #fff; font-family: inherit; width: 90%; margin-bottom: 10px; background: white; color: black; }
        #status-log { background: #000; color: #0f0; padding: 8px; font-family: monospace; font-size: 12px; margin-top: 10px; border: 2px inset #fff; min-height: 1.2em; }
        .profile-header { display: flex; gap: 15px; align-items: start; margin-bottom: 10px; }
        .pfp-img { width: 80px; height: 80px; background: #808080; border: 2px inset #fff; object-fit: cover; }
        .bio-text { font-style: italic; color: #404040; font-family: 'Georgia', serif; font-size: 0.9rem; margin: 10px 0; background: #e0e0e0; padding: 5px; border: 1px solid #808080; }
        .admin-box { border: 1px dashed #000; padding: 10px; margin-top: 15px; background: #c0c0c0; }
    </style>
</head>
<body>

<div class="nav-header">
    <a href="index.html" style="color:white; text-decoration:none; font-weight:bold;">< BACK</a>
    <span style="font-weight:bold; color:white;">USER_PROFILE.EXE</span>
</div>

<div class="win-window">
    <div id="profile-display">
        <div class="profile-header">
            <img id="pfp-display" src="" class="pfp-img">
            <div>
                <h2 id="username-display" style="margin:0;">Loading...</h2>
                <div id="bio-display" class="bio-text">Scanning archive...</div>
            </div>
        </div>
        <button class="win-btn" id="edit-btn" style="display:none;" onclick="enableEdit()">EDIT PROFILE</button>
    </div>

    <div id="profile-edit" style="display:none;">
        <div class="win-title">Modify Profile Data</div>
        
        <label>Profile Picture:</label><br>
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
            <img id="edit-pfp-preview" src="" class="pfp-img" style="width:50px; height:50px;">
            <input type="file" id="pfp-upload" accept="image/*" style="display:none;">
            <button class="win-btn" onclick="document.getElementById('pfp-upload').click()">UPDATE ICON</button>
        </div>
        <input type="hidden" id="edit-pfp-url">

        <label>Username:</label><br>
        <input type="text" id="edit-username-input">
        
        <label>Bio:</label><br>
        <textarea id="edit-bio-input" rows="3"></textarea>

        <div style="margin-top:10px;">
            <button class="win-btn" onclick="saveProfile()">SAVE</button>
            <button class="win-btn" onclick="disableEdit()">CANCEL</button>
        </div>
    </div>

    <div id="admin-tools" style="display:none;" class="admin-box">
        <p style="margin:0; font-weight:bold;">ROOT PRIVILEGES:</p>
        <button class="win-btn" style="background:#2ecc71; color:white;" onclick="setRank('admin')">OP USER</button>
        <button class="win-btn" style="background:#ff5555; color:white;" onclick="setRank('user')">DEOP USER</button>
    </div>

    <div id="status-log">> System Ready.</div>
</div>

<script>
    const _supabase = supabase.createClient('https://wemdedhwtlirdevkplch.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndlbWRlZGh3dGxpcmRldmtwbGNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMzE5MTgsImV4cCI6MjA5MjcwNzkxOH0.fh8S3ocN9vF7orCENvYk-eD1bCFXBkhvFVOpaE32q3o');
    const targetUserId = new URLSearchParams(window.location.search).get('id');
    
    // Fallback image from your GitHub
    const GITHUB_DEFAULT = "https://github.com/huggymug/thedailypaw/blob/main/defaultprofile.png?raw=true";

    function log(msg, isError = false) {
        const el = document.getElementById('status-log');
        el.innerText = "> " + msg;
        el.style.color = isError ? "#f55" : "#0f0";
    }

    // Handle PFP Upload
    document.getElementById('pfp-upload').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        log("Uploading new profile icon...");
        const fileName = `avatars/${Date.now()}_${file.name}`;
        
        const { data, error } = await _supabase.storage
            .from('article-images')
            .upload(fileName, file);

        if (error) return log(error.message, true);

        const { data: urlData } = _supabase.storage.from('article-images').getPublicUrl(fileName);
        
        document.getElementById('edit-pfp-url').value = urlData.publicUrl;
        document.getElementById('edit-pfp-preview').src = urlData.publicUrl;
        log("Icon uploaded. Remember to click SAVE.");
    };

    async function load() {
        if (!targetUserId) return log("Invalid User ID", true);

        const { data: profile } = await _supabase.from('profiles').select('*').eq('id', targetUserId).single();
        
        if (profile) {
            document.getElementById('username-display').innerText = profile.username + (profile.rank === 'admin' ? ' ☑' : '');
            document.getElementById('bio-display').innerText = profile.bio || "No information available.";
            
            // Logic for default GitHub icon
            const currentPfp = profile.avatar_url || GITHUB_DEFAULT;
            document.getElementById('pfp-display').src = currentPfp;
            document.getElementById('edit-pfp-preview').src = currentPfp;
            document.getElementById('edit-pfp-url').value = profile.avatar_url || "";

            document.getElementById('edit-username-input').value = profile.username;
            document.getElementById('edit-bio-input').value = profile.bio || "";

            // Check if viewing own profile or if visitor is admin
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) {
                if (session.user.id === targetUserId) {
                    document.getElementById('edit-btn').style.display = 'block';
                }
                const { data: myProf } = await _supabase.from('profiles').select('rank').eq('id', session.user.id).single();
                if (myProf?.rank === 'admin') {
                    document.getElementById('admin-tools').style.display = 'block';
                }
            }
            log("User data retrieved.");
        }
    }

    function enableEdit() {
        document.getElementById('profile-display').style.display = 'none';
        document.getElementById('profile-edit').style.display = 'block';
    }

    function disableEdit() {
        document.getElementById('profile-display').style.display = 'block';
        document.getElementById('profile-edit').style.display = 'none';
    }

    async function saveProfile() {
        log("Updating database records...");
        const { error } = await _supabase.from('profiles').update({
            username: document.getElementById('edit-username-input').value,
            bio: document.getElementById('edit-bio-input').value,
            avatar_url: document.getElementById('edit-pfp-url').value
        }).eq('id', targetUserId);

        if (error) log(error.message, true);
        else location.reload();
    }

    async function setRank(newRank) {
        log(`Executing rank override: ${newRank}`);
        const { error } = await _supabase.from('profiles').update({ rank: newRank }).eq('id', targetUserId);
        if (error) log(error.message, true);
        else location.reload();
    }

    load();
</script>
</body>
</html>
