<!DOCTYPE html>
<html>
<head>
    <title>The Daily Paw | Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="icon" type="image/png" href="tdp.png">
    <style>
        :root { --win-gray: #d4d0c8; --win-blue: #000080; }
        body { background: #3b3b3b; color: white; font-family: "Segoe UI", Arial; margin: 0; padding: 20px; padding-top: 60px; }
        .nav-header { position: fixed; top: 0; left: 0; right: 0; background: var(--win-blue); padding: 10px; display: flex; justify-content: space-between; z-index: 100; border-bottom: 2px solid #fff; }
        .win-window { background: var(--win-gray); color: black; border: 2px solid #fff; border-right: 2px solid #404040; border-bottom: 2px solid #404040; padding: 15px; max-width: 600px; margin: auto; }
        .win-title { background: var(--win-blue); color: white; padding: 4px; font-weight: bold; margin-bottom: 10px; font-size: 14px; }
        .win-btn { padding: 5px 12px; background: var(--win-gray); border: 2px solid #fff; border-right: 2px solid #404040; border-bottom: 2px solid #404040; cursor: pointer; font-weight: bold; font-family: inherit; }
        .win-btn:active { border: 2px inset #fff; }
        input { padding: 5px; border: 2px inset #fff; font-family: inherit; width: 80%; }
        #status-log { background: #000; color: #0f0; padding: 8px; font-family: monospace; font-size: 12px; margin-top: 10px; border: 2px inset #fff; min-height: 20px; }
        .post-item { background: white; border: 1px solid #000; padding: 10px; margin-top: 8px; display: block; color: black; text-decoration: none; }
        .admin-box { margin-top: 15px; border: 1px dashed #404040; padding: 10px; background: #c0c0c0; }
    </style>
</head>
<body>

<div class="nav-header">
    <a href="index.html" style="color:white; text-decoration:none; font-weight:bold;">< BACK</a>
    <span style="font-weight:bold; color:white;">USER_PROFILE.EXE</span>
</div>

<div class="win-window">
    <div class="win-title">Profile Information</div>
    
    <div id="profile-display">
        <h2 id="username-display">Loading...</h2>
        <button class="win-btn" id="edit-btn" style="display:none;" onclick="enableEdit()">EDIT PROFILE</button>
    </div>

    <div id="profile-edit" style="display:none;">
        <p>New Username:</p>
        <input type="text" id="edit-username-input">
        <div style="margin-top:10px;">
            <button class="win-btn" onclick="saveProfile()">SAVE</button>
            <button class="win-btn" onclick="disableEdit()">CANCEL</button>
        </div>
    </div>

    <div id="admin-tools" style="display:none;" class="admin-box">
        <p><strong>ADMIN TOOLS:</strong></p>
        <button class="win-btn" style="background:#2ecc71; color:white;" onclick="setRank('admin')">PROMOTE TO ADMIN</button>
        <button class="win-btn" style="background:#ff5555; color:white;" onclick="setRank('user')">DEMOTE TO USER</button>
    </div>

    <div id="status-log">> System Ready.</div>

    <div style="margin-top:20px;">
        <div class="win-title">Post History</div>
        <div id="post-list">Scanning...</div>
    </div>
</div>

<script>
    const _supabase = supabase.createClient('https://wemdedhwtlirdevkplch.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndlbWRlZGh3dGxpcmRldmtwbGNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMzE5MTgsImV4cCI6MjA5MjcwNzkxOH0.fh8S3ocN9vF7orCENvYk-eD1bCFXBkhvFVOpaE32q3o');
    const targetUserId = new URLSearchParams(window.location.search).get('id');

    function log(msg, isError = false) {
        const el = document.getElementById('status-log');
        el.innerText = "> " + msg;
        el.style.color = isError ? "#f55" : "#0f0";
    }

    async function load() {
        if (!targetUserId) return log("Invalid User ID", true);

        // Load the profile data
        const { data: profile } = await _supabase.from('profiles').select('*').eq('id', targetUserId).single();
        
        if (profile) {
            let badge = profile.rank === 'admin' ? ' ☑' : '';
            document.getElementById('username-display').innerText = profile.username + badge;
            document.getElementById('edit-username-input').value = profile.username;

            // Check permissions
            const { data: { user } } = await _supabase.auth.getUser();
            if (user) {
                // If this is my own profile, show edit button
                if (user.id === targetUserId) {
                    document.getElementById('edit-btn').style.display = 'inline-block';
                }
                // If I am an admin, show admin tools
                const { data: me } = await _supabase.from('profiles').select('rank').eq('id', user.id).single();
                if (me?.rank === 'admin') {
                    document.getElementById('admin-tools').style.display = 'block';
                }
            }
            loadPosts();
        }
    }

    async function loadPosts() {
        const { data: posts } = await _supabase.from('articles').select('*').eq('user_id', targetUserId).order('id', {ascending: false});
        const postList = document.getElementById('post-list');
        postList.innerHTML = posts?.length ? "" : "No posts found.";
        posts?.forEach(p => {
            const a = document.createElement('a');
            a.className = 'post-item';
            a.href = `article_view.html?id=${p.id}`;
            a.innerHTML = `<strong>${p.title}</strong><br><small>${p.date}</small>`;
            postList.appendChild(a);
        });
    }

    function enableEdit() {
        document.getElementById('profile-display').style.display = 'none';
        document.getElementById('profile-edit').style.display = 'block';
    }

    function disableEdit() {
        document.getElementById('profile-display').style.display = 'block';
        document.getElementById('profile-edit').style.display = 'none';
    }

    async function saveProfile() {
        log("Updating username...");
        const newName = document.getElementById('edit-username-input').value;
        const { error } = await _supabase.from('profiles').update({ username: newName }).eq('id', targetUserId);
        if (error) log(error.message, true);
        else location.reload();
    }

    async function setRank(newRank) {
        log(`Setting rank to ${newRank}...`);
        const { error } = await _supabase.from('profiles').update({ rank: newRank }).eq('id', targetUserId);
        if (error) {
            log("Error: " + error.message, true);
        } else {
            log("Success! Reloading...");
            setTimeout(() => location.reload(), 1000);
        }
    }

    load();
</script>
</body>
</html>
