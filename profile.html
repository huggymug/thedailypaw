<!DOCTYPE html>
<html>
<head>
    <title>The Daily Paw | Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --win-gray: #d4d0c8; --win-blue: #000080; }
        body { background: #3b3b3b; color: white; font-family: "Segoe UI", Arial; padding: 20px; padding-top: 65px; }
        .nav-header { position: fixed; top: 0; left: 0; right: 0; background: var(--win-blue); padding: 10px; display: flex; justify-content: space-between; z-index: 100; border-bottom: 2px solid #fff; }
        .win-window { background: var(--win-gray); color: black; border: 2px solid #fff; border-right: 2px solid #404040; border-bottom: 2px solid #404040; padding: 15px; max-width: 500px; margin: auto; }
        .win-btn { padding: 8px 15px; background: var(--win-gray); border: 2px solid #fff; border-right: 2px solid #404040; border-bottom: 2px solid #404040; cursor: pointer; font-weight: bold; font-family: inherit; font-size: 0.8rem; }
        #status-log { background: #000; color: #0f0; padding: 5px; font-family: monospace; font-size: 0.7rem; margin-top: 10px; border: 2px inset #fff; }
    </style>
</head>
<body>

<div class="nav-header">
    <a href="index.html" style="color:white; text-decoration:none; font-weight:bold;">< BACK</a>
    <span style="color:white; font-weight:bold;">USER_PROFILE.EXE</span>
</div>

<div class="win-window">
    <h2 id="username-display">Loading...</h2>
    <hr>
    
    <div id="admin-tools" style="display:none; padding:10px; border:1px dashed #404040; background:#c0c0c0;">
        <p><strong>ADMIN PRIVILEGES:</strong></p>
        <button class="win-btn" style="background:#2ecc71; color:white;" onclick="setRank('admin')">PROMOTE TO ADMIN</button>
        <button class="win-btn" style="background:#ff5555; color:white;" onclick="setRank('user')">DEMOTE TO USER</button>
    </div>

    <div id="status-log">> Initializing...</div>
</div>

<script>
    const _supabase = supabase.createClient('https://wemdedhwtlirdevkplch.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndlbWRlZGh3dGxpcmRldmtwbGNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMzE5MTgsImV4cCI6MjA5MjcwNzkxOH0.fh8S3ocN9vF7orCENvYk-eD1bCFXBkhvFVOpaE32q3o');
    const targetId = new URLSearchParams(window.location.search).get('id');

    function log(msg, isError = false) {
        const el = document.getElementById('status-log');
        el.innerText = "> " + msg;
        el.style.color = isError ? "#f55" : "#0f0";
    }

    async function loadProfile() {
        if (!targetId) return log("No User ID found.", true);

        // 1. Fetch target user info
        const { data: profile } = await _supabase.from('profiles').select('*').eq('id', targetId).single();
        if (profile) {
            document.getElementById('username-display').innerText = profile.username + (profile.rank === 'admin' ? ' ☑' : '');
            log(`Viewing: ${profile.username} (Rank: ${profile.rank})`);
        }

        // 2. Check if current logged-in user is an admin
        const { data: { user } } = await _supabase.auth.getUser();
        if (user) {
            const { data: me } = await _supabase.from('profiles').select('rank').eq('id', user.id).single();
            if (me?.rank === 'admin') {
                document.getElementById('admin-tools').style.display = 'block';
            }
        }
    }

    async function setRank(newRank) {
        log(`Pushing ${newRank} rank to database...`);
        
        const { error } = await _supabase
            .from('profiles')
            .update({ rank: newRank })
            .eq('id', targetId);

        if (error) {
            log(`FAIL: ${error.message} (Code: ${error.code})`, true);
        } else {
            log("SUCCESS! Refreshing...");
            setTimeout(() => location.reload(), 800);
        }
    }

    loadProfile();
</script>
</body>
</html>
