<!DOCTYPE html>
<html>
<head>
    <title>The Daily Paw | Archive</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="icon" type="image/png" href="tdp.png">
    <style>
        body { background: #3b3b3b; color: white; font-family: "Segoe UI", Arial; margin: 0; padding: 10px; padding-top: 60px; }
        .nav-header { position: fixed; top: 0; left: 0; right: 0; background: #000080; padding: 10px; display: flex; justify-content: space-between; align-items: center; z-index: 100; border-bottom: 2px solid #fff; }
        .win-window { background: #d4d0c8; border: 2px solid #fff; border-right: 2px solid #404040; border-bottom: 2px solid #404040; color: black; padding: 15px; max-width: 800px; margin: auto; }
        input { flex-grow: 1; padding: 8px; border: 2px inset #fff; font-size: 16px; }
        .win-btn { padding: 8px 15px; background: #d4d0c8; border: 2px solid #fff; border-right: 2px solid #404040; border-bottom: 2px solid #404040; cursor: pointer; font-weight: bold; text-decoration: none; color: black; font-size: 0.8rem; }
        .article-link { background: white; border: 1px solid #000; margin-bottom: 10px; padding: 15px; display: block; color: black; text-decoration: none; box-shadow: 4px 4px 0 #000; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; display: none; justify-content: center; align-items: center; }
        .login-window { background: #d4d0c8; border: 2px solid #fff; border-right: 2px solid #404040; border-bottom: 2px solid #404040; padding: 20px; width: 280px; color: black; }
    </style>
</head>
<body>

<div id="loginModal" class="modal-overlay">
    <div class="login-window">
        <div style="background:#000080; color:white; padding:5px; font-weight:bold; margin-bottom:15px;">[ ARCHIVE_LOGIN.EXE ]</div>
        <input type="email" id="auth-email" placeholder="Email" style="width:90%; margin-bottom:10px;">
        <input type="password" id="auth-password" placeholder="Password" style="width:90%; margin-bottom:10px;">
        <div style="display:flex; gap:5px;">
            <button class="win-btn" onclick="handleAuth('login')">LOGIN</button>
            <button class="win-btn" onclick="handleAuth('signup')">SIGN UP</button>
        </div>
        <button class="win-btn" onclick="document.getElementById('loginModal').style.display='none'" style="margin-top:10px; width:100%;">CANCEL</button>
    </div>
</div>

<div class="nav-header">
    <span>[ DAILY_PAW_ARCHIVE ]</span>
    <div id="auth-zone">
        <button class="win-btn" onclick="document.getElementById('loginModal').style.display='flex'">LOGIN</button>
        <a href="editor.html" class="win-btn" style="background:#2ecc71; color:white;">+ POST</a>
    </div>
</div>

<div class="win-window">
    <div style="display:flex; gap:5px; margin-bottom:20px;">
        <input type="text" id="searchInput" placeholder="Search archive..." oninput="searchArticles()">
        <button class="win-btn" onclick="searchArticles()">FIND</button>
    </div>
    <div id="articleList">Scanning database...</div>
</div>

<script>
    const _supabase = supabase.createClient('https://wemdedhwtlirdevkplch.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndlbWRlZGh3dGxpcmRldmtwbGNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMzE5MTgsImV4cCI6MjA5MjcwNzkxOH0.fh8S3ocN9vF7orCENvYk-eD1bCFXBkhvFVOpaE32q3o');

    async function checkSession() {
        const { data: { session } } = await _supabase.auth.getSession();
        if (session) {
            document.getElementById('auth-zone').innerHTML = `
                <span style="color:white; font-size:0.7rem; margin-right:10px;">${session.user.email}</span>
                <a href="editor.html" class="win-btn" style="background:#2ecc71; color:white;">+ POST</a>
            `;
        }
    }

    async function handleAuth(type) {
        const email = document.getElementById('auth-email').value;
        const password = document.getElementById('auth-password').value;
        const { error } = (type === 'login') 
            ? await _supabase.auth.signInWithPassword({ email, password })
            : await _supabase.auth.signUp({ email, password });
        if (error) alert(error.message);
        else location.reload();
    }

    async function searchArticles() {
        const query = document.getElementById('searchInput').value;
        const list = document.getElementById('articleList');
        let { data: articles } = await _supabase.from('articles').select('*').ilike('title', `%${query}%`).order('id', { ascending: false });
        list.innerHTML = articles && articles.length ? "" : "<p>No records found.</p>";
        if(articles) {
            articles.forEach(art => {
                const item = document.createElement('a');
                item.className = 'article-link';
                item.href = `article_view.html?id=${art.id}`;
                item.innerHTML = `<small>${art.date}</small><br><strong>${art.title}</strong>`;
                list.appendChild(item);
            });
        }
    }
    checkSession();
    searchArticles();
</script>
</body>
</html>
