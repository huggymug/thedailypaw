<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Daily Paw | Archive</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="icon" type="image/png" href="tdp.png">
    <style>
        :root { --win-gray: #d4d0c8; --win-blue: #000080; }
        body { background: #3b3b3b; color: white; font-family: "Segoe UI", Arial; margin: 0; padding: 10px; padding-top: 60px; }
        
        .nav-header { 
            position: fixed; top: 0; left: 0; right: 0; background: var(--win-blue); 
            padding: 5px 10px; display: flex; justify-content: space-between; align-items: center; 
            z-index: 100; border-bottom: 2px solid #fff; height: 45px; overflow: hidden;
        }
        .nav-title { font-weight: bold; color: white; font-size: 0.85rem; white-space: nowrap; }
        .auth-zone { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .user-tag { color: white; font-size: 0.7rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100px; }

        .win-window { background: var(--win-gray); border: 2px solid #fff; border-right: 2px solid #404040; border-bottom: 2px solid #404040; color: black; padding: 15px; max-width: 800px; margin: auto; }
        .win-btn { padding: 5px 10px; background: var(--win-gray); border: 2px solid #fff; border-right: 2px solid #404040; border-bottom: 2px solid #404040; cursor: pointer; font-weight: bold; text-decoration: none; color: black; font-size: 0.75rem; white-space: nowrap; }
        
        .article-card { background: white; border: 1px solid #000; margin-bottom: 12px; padding: 15px; display: block; color: black; text-decoration: none; box-shadow: 5px 5px 0 #000; position: relative; }
        .del-btn { position: absolute; top: 10px; right: 10px; background: #ff5555; color: white; border: 1px solid #000; padding: 2px 6px; font-size: 0.6rem; cursor: pointer; }
        input { flex-grow: 1; padding: 8px; border: 2px inset #fff; font-size: 16px; }
    </style>
</head>
<body>

<div class="nav-header">
    <div class="nav-title">[ DAILY_PAW ]</div>
    <div id="auth-zone" class="auth-zone">
        <a href="editor.html" class="win-btn" style="background:#2ecc71; color:white;">+ POST</a>
    </div>
</div>

<div class="win-window">
    <div style="display:flex; gap:5px; margin-bottom:20px;">
        <input type="text" id="searchInput" placeholder="Search archive..." oninput="searchArticles()">
        <button class="win-btn" onclick="searchArticles()">FIND</button>
    </div>
    <div id="articleList">Scanning database...</div>
</div>

<script>
    const _supabase = supabase.createClient('https://wemdedhwtlirdevkplch.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndlbWRlZGh3dGxpcmRldmtwbGNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMzE5MTgsImV4cCI6MjA5MjcwNzkxOH0.fh8S3ocN9vF7orCENvYk-eD1bCFXBkhvFVOpaE32q3o');
    let currentUser = null;
    let userRank = 'user';

    async function init() {
        const { data: { session } } = await _supabase.auth.getSession();
        if (session) {
            currentUser = session.user;
            const { data: profile } = await _supabase.from('profiles').select('rank').eq('id', currentUser.id).single();
            userRank = profile?.rank || 'user';
            document.getElementById('auth-zone').innerHTML = `
                <span class="user-tag">${currentUser.email}</span>
                <a href="editor.html" class="win-btn" style="background:#2ecc71; color:white;">+ POST</a>
            `;
        }
        searchArticles();
    }

    async function searchArticles() {
        const query = document.getElementById('searchInput').value;
        const list = document.getElementById('articleList');
        let { data: articles } = await _supabase.from('articles').select('*').ilike('title', `%${query}%`).order('id', { ascending: false });
        
        list.innerHTML = articles?.length ? "" : "<p>No records found.</p>";
        articles?.forEach(art => {
            const card = document.createElement('div');
            card.className = 'article-card';
            
            const canDelete = (currentUser && currentUser.id === art.user_id) || userRank === 'admin';
            const delHtml = canDelete ? `<button class="del-btn" onclick="deletePost('${art.id}')">DEL</button>` : '';

            card.innerHTML = `
                ${delHtml}
                <a href="article_view.html?id=${art.id}" style="text-decoration:none; color:black;">
                    <small>${art.date || ''}</small><br>
                    <strong>${art.title}</strong>
                </a>`;
            list.appendChild(card);
        });
    }

    async function deletePost(id) {
        if (!confirm("Permanently delete this post?")) return;
        const { error } = await _supabase.from('articles').delete().eq('id', id);
        if (error) alert(error.message);
        else searchArticles();
    }

    init();
</script>
</body>
</html>
