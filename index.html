<!DOCTYPE html>
<html>
<head>
    <title>The Daily Paw | Archive</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="icon" type="image/png" href="tdp.png">
    <style>
        :root { --win-gray: #d4d0c8; --win-blue: #000080; }
        body { background: #3b3b3b; color: white; font-family: "Segoe UI", Arial; margin: 0; padding: 10px; padding-top: 60px; }
        .nav-header { position: fixed; top: 0; left: 0; right: 0; background: var(--win-blue); padding: 5px 10px; display: flex; justify-content: space-between; align-items: center; z-index: 100; border-bottom: 2px solid #fff; height: 40px; overflow: hidden; }
        .nav-title { font-weight: bold; color: white; font-size: 0.85rem; white-space: nowrap; }
        .auth-zone { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
        .user-display { color: white; font-size: 0.7rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100px; }
        .win-window { background: var(--win-gray); border: 2px solid #fff; border-right: 2px solid #404040; border-bottom: 2px solid #404040; color: black; padding: 15px; max-width: 800px; margin: auto; }
        input { flex-grow: 1; padding: 8px; border: 2px inset #fff; font-size: 16px; }
        .win-btn { padding: 5px 10px; background: var(--win-gray); border: 2px solid #fff; border-right: 2px solid #404040; border-bottom: 2px solid #404040; cursor: pointer; font-weight: bold; text-decoration: none; color: black; font-size: 0.75rem; white-space: nowrap; }
        .article-link { background: white; border: 1px solid #000; margin-bottom: 10px; padding: 15px; display: block; color: black; text-decoration: none; box-shadow: 4px 4px 0 #000; }
    </style>
</head>
<body>

<div class="nav-header">
    <div class="nav-title">[ DAILY_PAW ]</div>
    <div id="auth-zone" class="auth-zone">
        <a href="editor.html" class="win-btn" style="background:#2ecc71; color:white;">+ POST</a>
    </div>
</div>

<div class="win-window">
    <div style="display:flex; gap:5px; margin-bottom:20px;">
        <input type="text" id="searchInput" placeholder="Search archive..." oninput="searchArticles()">
        <button class="win-btn" onclick="searchArticles()">FIND</button>
    </div>
    <div id="articleList">Scanning...</div>
</div>

<script>
    const _supabase = supabase.createClient('https://wemdedhwtlirdevkplch.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndlbWRlZGh3dGxpcmRldmtwbGNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMzE5MTgsImV4cCI6MjA5MjcwNzkxOH0.fh8S3ocN9vF7orCENvYk-eD1bCFXBkhvFVOpaE32q3o');

    async function checkSession() {
        const { data: { session } } = await _supabase.auth.getSession();
        if (session) {
            document.getElementById('auth-zone').innerHTML = `
                <span class="user-display">${session.user.email}</span>
                <a href="editor.html" class="win-btn" style="background:#2ecc71; color:white;">+ POST</a>
            `;
        }
    }

    async function searchArticles() {
        const query = document.getElementById('searchInput').value;
        const list = document.getElementById('articleList');
        let { data: articles } = await _supabase.from('articles').select('*').ilike('title', `%${query}%`).order('id', { ascending: false });
        list.innerHTML = articles && articles.length ? "" : "<p>No records found.</p>";
        articles?.forEach(art => {
            const item = document.createElement('a');
            item.className = 'article-link';
            item.href = `article_view.html?id=${art.id}`;
            item.innerHTML = `<small>${art.date || ''}</small><br><strong>${art.title}</strong>`;
            list.appendChild(item);
        });
    }
    checkSession();
    searchArticles();
</script>
</body>
</html>
