<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Daily Paw | Archive</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="icon" type="image/png" href="tdp.png">
    <style>
        :root { --win-gray: #d4d0c8; --win-blue: #000080; }
        body { background: #3b3b3b; color: white; font-family: "Segoe UI", Arial; margin: 0; padding: 10px; padding-top: 60px; }
        .nav-header { position: fixed; top: 0; left: 0; right: 0; background: var(--win-blue); padding: 10px; display: flex; justify-content: space-between; align-items: center; z-index: 100; border-bottom: 2px solid #fff; height: 45px; }
        .win-window { background: var(--win-gray); border: 2px solid #fff; border-right: 2px solid #404040; border-bottom: 2px solid #404040; color: black; padding: 15px; max-width: 800px; margin: auto; }
        .win-btn { padding: 4px 8px; background: var(--win-gray); border: 2px solid #fff; border-right: 2px solid #404040; border-bottom: 2px solid #404040; cursor: pointer; font-weight: bold; text-decoration: none; color: black; font-size: 0.7rem; }
        .article-card { background: white; border: 1px solid #000; margin-bottom: 12px; padding: 15px; display: block; color: black; text-decoration: none; box-shadow: 4px 4px 0 #000; position: relative; }
        .pfp-nav { width: 32px; height: 32px; border: 2px solid #fff; cursor: pointer; object-fit: cover; background: #808080; }
        .del-btn { position: absolute; top: 5px; right: 5px; color: red; border: 1px solid red; background: white; cursor: pointer; font-size: 0.65rem; padding: 2px 4px; }
    </style>
</head>
<body>
<div class="nav-header">
    <div id="auth-header" style="display:flex; align-items:center; gap:10px;"></div>
    <a href="editor.html" class="win-btn" style="background:#2ecc71; color:white;">+ POST</a>
</div>
<div class="win-window"><div id="articleList">INITIALIZING...</div></div>

<script>
    const client = supabase.createClient('https://wemdedhwtlirdevkplch.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndlbWRlZGh3dGxpcmRldmtwbGNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMzE5MTgsImV4cCI6MjA5MjcwNzkxOH0.fh8S3ocN9vF7orCENvYk-eD1bCFXBkhvFVOpaE32q3o');
    let currentUser = null;
    let myRank = 0;

    async function deletePost(id) {
        if (!confirm("Delete post?")) return;
        await client.from('articles').delete().eq('id', id);
        loadArticles();
    }

    async function loadArticles() {
        const { data: articles } = await client.from('articles').select('*, profiles(username)').order('id', { ascending: false });
        document.getElementById('articleList').innerHTML = articles.map(a => {
            const canDel = currentUser && (a.user_id === currentUser.id || myRank === 1);
            const del = canDel ? `<button class="del-btn" onclick="event.preventDefault(); deletePost(${a.id})">DEL</button>` : '';
            return `<a class="article-card" href="article_view.html?id=${a.id}">${del}<strong>${a.title}</strong><br><small>Author: ${a.profiles?.username || 'Anonymous'}</small></a>`;
        }).join('');
    }

    async function init() {
        const { data: { session } } = await client.auth.getSession();
        const authDiv = document.getElementById('auth-header');
        if (session) {
            currentUser = session.user;
            const { data: p } = await client.from('profiles').select('*').eq('id', currentUser.id).single();
            myRank = p?.rank || 0;
            authDiv.innerHTML = `
                <img src="${p?.avatar_url || 'https://github.com/huggymug/thedailypaw/blob/main/defaultprofile.png?raw=true'}" class="pfp-nav" onclick="location.href='profile.html?id=${currentUser.id}'">
                <button class="win-btn" onclick="client.auth.signOut().then(()=>location.reload())">OUT</button>
            `;
        } else { authDiv.innerHTML = `<a href="login.html" class="win-btn">IN</a>`; }
        loadArticles();
    }
    init();
</script>
</body>
</html>
