<!DOCTYPE html>
<html>
<head>
    <title>The Daily Paw | Archive</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #3b3b3b; color: white; font-family: "Segoe UI", Arial; margin: 20px; }
        .win-window { background: #d4d0c8; border: 2px solid #fff; border-right: 2px solid #404040; border-bottom: 2px solid #404040; color: black; padding: 15px; max-width: 800px; margin: auto; }
        .header { background: #000080; color: white; padding: 5px; font-weight: bold; margin-bottom: 15px; }
        .search-box { margin-bottom: 20px; display: flex; gap: 10px; }
        input { flex-grow: 1; padding: 5px; border: 2px solid #404040; }
        button { padding: 5px 15px; background: #d4d0c8; border: 2px solid #fff; border-right: 2px solid #404040; border-bottom: 2px solid #404040; cursor: pointer; font-weight: bold; }
        .article-link { display: block; padding: 10px; background: white; border: 1px solid #808080; margin-bottom: 5px; text-decoration: none; color: black; }
        .article-link:hover { background: #ffffcc; border: 1px solid #000; }
        .article-date { font-size: 0.75rem; color: #666; }
    </style>
</head>
<body>

<div class="win-window">
    <div class="header">HUGGYMUG_ARCHIVE.EXE</div>
    
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search by headline..." oninput="searchArticles()">
        <button onclick="searchArticles()">SEARCH</button>
    </div>

    <div id="articleList">
        <p>Initializing connection...</p>
    </div>
</div>

<script>
const supabaseUrl = 'https://wemdedhwtlirdevkplch.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndlbWRlZGh3dGxpcmRldmtwbGNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMzE5MTgsImV4cCI6MjA5MjcwNzkxOH0.fh8S3ocN9vF7orCENvYk-eD1bCFXBkhvFVOpaE32q3o'; 
const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

async function searchArticles() {
    const query = document.getElementById('searchInput').value;
    const list = document.getElementById('articleList');

    // Show a loading state while we wait
    list.innerHTML = "<p>Searching archives...</p>";

    let { data: articles, error } = await _supabase
        .from('articles')
        .select('*')
        .ilike('title', `%${query}%`)
        .order('id', { ascending: false }); // Sort by ID as a fallback

    if (error) {
        list.innerHTML = `<p style="color:red;">Error: ${error.message}</p>`;
        return;
    }

    if (articles.length === 0) {
        list.innerHTML = "<p>No articles found. Try a different search or publish a new story!</p>";
        return;
    }

    list.innerHTML = "";
    articles.forEach(art => {
        const item = document.createElement('a');
        item.className = 'article-link';
        item.href = `article_view.html?id=${art.id}`;
        item.innerHTML = `
            <div class="article-date">${art.date || 'Date Unknown'}</div>
            <strong>${art.title}</strong>
        `;
        list.appendChild(item);
    });
}

window.onload = searchArticles;
</script>

</body>
</html>
