<!DOCTYPE html>
<html>
<head>
    <title>The Daily Paw | Archive</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #3b3b3b; color: white; font-family: "Segoe UI", Arial; margin: 20px; }
        .win-window { background: #d4d0c8; border: 2px solid #fff; border-right: 2px solid #404040; border-bottom: 2px solid #404040; color: black; padding: 15px; max-width: 800px; margin: auto; }
        .header { background: #000080; color: white; padding: 5px; font-weight: bold; margin-bottom: 15px; }
        
        /* Search Bar Area */
        .search-box { margin-bottom: 20px; display: flex; gap: 10px; }
        input { flex-grow: 1; padding: 5px; border: 2px solid #404040; }
        button { padding: 5px 15px; background: #d4d0c8; border: 2px solid #fff; border-right: 2px solid #404040; border-bottom: 2px solid #404040; cursor: pointer; font-weight: bold; }
        
        /* Article List Items */
        .article-link { background: white; border: 1px solid #000; margin-bottom: 10px; padding: 10px; display: block; color: black; text-decoration: none; }
        .article-link:hover { background: #ffffcc; border: 1px solid #000080; }
        .article-date { font-size: 0.8rem; color: #666; }
    </style>
</head>
<body>

<div class="win-window">
    <div class="header">THE_DAILY_PAW_ARCHIVE.EXE</div>
    
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search by headline..." oninput="searchArticles()">
        <button onclick="searchArticles()">SEARCH</button>
    </div>

    <div id="articleList">
        <p>Loading database...</p>
    </div>
</div>

<script>
    const _supabase = supabase.createClient('https://wemdedhwtlirdevkplch.supabase.co', 'wemdedhwtlirdevkplch');

    async function searchArticles() {
        const query = document.getElementById('searchInput').value;
        const list = document.getElementById('articleList');

        let { data: articles, error } = await _supabase
            .from('articles')
            .select('*')
            .ilike('title', `%${query}%`) // Searches titles
            .order('created_at', { ascending: false });

        if (error) {
            list.innerHTML = "<p>Error connecting to Supabase.</p>";
            return;
        }

        list.innerHTML = articles.length ? "" : "<p>No articles found.</p>";
        
        articles.forEach(art => {
            const item = document.createElement('a');
            item.className = 'article-link';
            item.href = `article_view.html?id=${art.id}`; // You'd build a viewer page later
            item.innerHTML = `
                <div class="article-date">${art.date}</div>
                <strong>${art.title}</strong>
            `;
            list.appendChild(item);
        });
    }

    // Load all articles on start
    searchArticles();
</script>

</body>
</html>
