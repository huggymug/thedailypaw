<!DOCTYPE html>
<html>
<head>
    <title>The Daily Paw | Archive</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Daily Paw">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #3b3b3b; color: white; font-family: "Segoe UI", Arial; margin: 0; padding: 20px; }
        .win-window { background: #d4d0c8; border: 2px solid #fff; border-right: 2px solid #404040; border-bottom: 2px solid #404040; color: black; padding: 15px; max-width: 800px; margin: auto; }
        .header { background: #000080; color: white; padding: 5px; font-weight: bold; margin-bottom: 15px; display: flex; justify-content: space-between; }
        .search-box { margin-bottom: 20px; display: flex; gap: 10px; }
        input { flex-grow: 1; padding: 5px; border: 2px inset #fff; }
        .win-btn { padding: 5px 15px; background: #d4d0c8; border: 2px solid #fff; border-right: 2px solid #404040; border-bottom: 2px solid #404040; cursor: pointer; font-weight: bold; }
        .article-link { background: white; border: 1px solid #000; margin-bottom: 10px; padding: 10px; display: block; color: black; text-decoration: none; }
    </style>
</head>
<body>

<div class="win-window">
    <div class="header"><span>[ DAILY_PAW_ARCHIVE.EXE ]</span><span>X</span></div>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search archive..." oninput="searchArticles()">
        <button class="win-btn" onclick="searchArticles()">FIND</button>
    </div>
    <div id="articleList"><p style="text-align:center;">Scanning database...</p></div>
</div>

<script>
    const _supabase = supabase.createClient('https://wemdedhwtlirdevkplch.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndlbWRlZGh3dGxpcmRldmtwbGNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMzE5MTgsImV4cCI6MjA5MjcwNzkxOH0.fh8S3ocN9vF7orCENvYk-eD1bCFXBkhvFVOpaE32q3o');

    async function searchArticles() {
        const query = document.getElementById('searchInput').value;
        const list = document.getElementById('articleList');
        let { data: articles } = await _supabase.from('articles').select('*').ilike('title', `%${query}%`).order('id', { ascending: false });
        
        list.innerHTML = articles && articles.length ? "" : "<p>No records found.</p>";
        if(articles) {
            articles.forEach(art => {
                const item = document.createElement('a');
                item.className = 'article-link';
                item.href = `article_view.html?id=${art.id}`;
                item.innerHTML = `<small>${art.date}</small><br><strong>${art.title}</strong>`;
                list.appendChild(item);
            });
        }
    }
    searchArticles();
</script>
</body>
</html>
