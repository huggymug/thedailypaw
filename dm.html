<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Daily Paw | Messenger</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --win-gray: #d4d0c8; --win-blue: #000080; }
        body { background: #3b3b3b; color: white; font-family: "Segoe UI", Arial; margin: 0; padding: 20px; }
        .win-window { background: var(--win-gray); color: black; border: 2px solid #fff; border-right: 2px solid #404040; border-bottom: 2px solid #404040; max-width: 500px; margin: auto; }
        .win-title { background: var(--win-blue); color: white; padding: 4px; font-weight: bold; display: flex; justify-content: space-between; }
        #chat-box { height: 300px; background: white; margin: 10px; border: 2px inset #fff; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 6px 10px; border-radius: 4px; max-width: 80%; font-size: 14px; }
        .sent { background: #dcf8c6; align-self: flex-end; border: 1px solid #999; }
        .received { background: #eee; align-self: flex-start; border: 1px solid #ccc; }
        .input-area { padding: 10px; display: flex; gap: 5px; background: var(--win-gray); }
        input { flex: 1; padding: 5px; border: 2px inset #fff; }
        button { padding: 5px 15px; background: var(--win-gray); border: 2px solid #fff; border-right: 2px solid #404040; border-bottom: 2px solid #404040; cursor: pointer; font-weight: bold; }
        #status-bar { background: #000; color: #0f0; font-family: monospace; font-size: 11px; padding: 5px; margin: 10px; border: 1px inset #fff; min-height: 1.2em; }
    </style>
</head>
<body>

<div class="win-window">
    <div class="win-title">
        <span id="chat-target">MESSENGER.EXE</span>
        <button onclick="window.location.href='index.html'" style="cursor:pointer;">X</button>
    </div>

    <div id="chat-box">
        <div id="loading-text" style="text-align:center; color:#888; font-size:12px; margin-top:100px;">SYSTEM: Awaiting initialization...</div>
    </div>

    <div class="input-area">
        <input type="text" id="message-input" placeholder="Type a message...">
        <button id="send-btn">SEND</button>
    </div>

    <div id="status-bar">> Booting system...</div>
</div>

<script>
    // Configuration
    const SB_URL = 'https://wemdedhwtlirdevkplch.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndlbWRlZGh3dGxpcmRldmtwbGNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMzE5MTgsImV4cCI6MjA5MjcwNzkxOH0.fh8S3ocN9vF7orCENvYk-eD1bCFXBkhvFVOpaE32q3o';
    
    // Global State
    let _supabase;
    let myId = null;
    const receiverId = new URLSearchParams(window.location.search).get('to');

    function log(msg, isError = false) {
        console.log("LOG:", msg);
        const el = document.getElementById('status-bar');
        el.innerText = "> " + msg;
        el.style.color = isError ? "#f55" : "#0f0";
    }

    async function start() {
        log("Initialising Supabase Client...");
        try {
            _supabase = supabase.createClient(SB_URL, SB_KEY);[cite: 1]
            
            log("Checking session...");
            const { data: { session }, error: sErr } = await _supabase.auth.getSession();[cite: 1]
            
            if (sErr || !session) {
                log("AUTH FAIL: No active session found.", true);
                document.getElementById('loading-text').innerText = "Auth Error: Please Login.";
                return;
            }

            myId = session.user.id;[cite: 1]
            log("Handshake successful. ID: " + myId.substring(0,8));

            // Set UI
            const { data: profile } = await _supabase.from('profiles').select('username').eq('id', receiverId).single();[cite: 1]
            if (profile) document.getElementById('chat-target').innerText = "CHAT: " + profile.username.toUpperCase();

            // Setup Listeners
            document.getElementById('send-btn').onclick = sendMessage;
            document.getElementById('message-input').onkeydown = (e) => { if(e.key === 'Enter') sendMessage(); };

            // Start Sync
            log("Syncing database...");
            fetchMessages();
            setInterval(fetchMessages, 3000);

        } catch (e) {
            log("CRITICAL STARTUP ERROR: " + e.message, true);
        }
    }

    async function fetchMessages() {
        const { data, error } = await _supabase
            .from('messages')
            .select('*')
            .or(`and(sender_id.eq.${myId},receiver_id.eq.${receiverId}),and(sender_id.eq.${receiverId},receiver_id.eq.${myId})`)
            .order('created_at', { ascending: true });[cite: 1]

        if (error) {
            log("SYNC ERROR: " + error.message, true);
            return;
        }

        const box = document.getElementById('chat-box');
        if (!data || data.length === 0) {
            box.innerHTML = '<div style="text-align:center; color:#888; font-size:12px; margin-top:20px;">No messages found.</div>';
        } else {
            box.innerHTML = data.map(m => `
                <div class="msg ${m.sender_id === myId ? 'sent' : 'received'}">
                    ${m.content}
                </div>
            `).join('');[cite: 1]
            box.scrollTop = box.scrollHeight;
        }
        log("Sync active.");
    }

    async function sendMessage() {
        const input = document.getElementById('message-input');
        const text = input.value.trim();
        if (!text) return;

        input.value = '';
        log("Transmitting message...");
        
        const { error } = await _supabase.from('messages').insert([
            { sender_id: myId, receiver_id: receiverId, content: text }
        ]);[cite: 1]

        if (error) {
            log("SEND ERROR: " + error.message, true);
        } else {
            fetchMessages();
            log("Transmission complete.");
        }
    }

    // Direct call instead of window.onload to force execution
    start();
</script>

</body>
</html>
