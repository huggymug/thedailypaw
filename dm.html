<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Daily Paw | Messenger</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="icon" type="image/png" href="tdp.png">
    <style>
        :root { --win-gray: #d4d0c8; --win-blue: #000080; }
        body { background: #3b3b3b; color: white; font-family: "Segoe UI", Arial; margin: 0; padding: 20px; }
        .win-window { background: var(--win-gray); color: black; border: 2px solid #fff; border-right: 2px solid #404040; border-bottom: 2px solid #404040; max-width: 500px; margin: auto; }
        .win-title { background: var(--win-blue); color: white; padding: 4px; font-weight: bold; display: flex; justify-content: space-between; }
        #chat-box { height: 300px; background: white; margin: 10px; border: 2px inset #fff; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 6px 10px; border-radius: 4px; max-width: 80%; font-size: 14px; }
        .sent { background: #dcf8c6; align-self: flex-end; border: 1px solid #999; }
        .received { background: #eee; align-self: flex-start; border: 1px solid #ccc; }
        .input-area { padding: 10px; display: flex; gap: 5px; background: var(--win-gray); }
        input { flex: 1; padding: 5px; border: 2px inset #fff; }
        button { padding: 5px 15px; background: var(--win-gray); border: 2px solid #fff; border-right: 2px solid #404040; border-bottom: 2px solid #404040; cursor: pointer; font-weight: bold; }
        #status-bar { background: #000; color: #0f0; font-family: monospace; font-size: 11px; padding: 5px; margin: 10px; border: 1px inset #fff; min-height: 1.2em; }
    </style>
</head>
<body>

<div class="win-window">
    <div class="win-title">
        <span id="chat-target">MESSENGER.EXE</span>
        <button onclick="window.history.back()" style="cursor:pointer;">X</button>
    </div>

    <div id="chat-box">
        <div id="loading-text" style="text-align:center; color:#888; font-size:12px; margin-top:100px;">SYSTEM: Awaiting initialization...</div>
    </div>

    <div class="input-area">
        <input type="text" id="message-input" placeholder="Type a message...">
        <button id="send-btn">SEND</button>
    </div>

    <div id="status-bar">> Initializing...</div>
</div>

<script>
    // Variables defined with strict equals signs to avoid "Unexpected token :"
    const url = 'https://wemdedhwtlirdevkplch.supabase.co';
    const key = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndlbWRlZGh3dGxpcmRldmtwbGNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMzE5MTgsImV4cCI6MjA5MjcwNzkxOH0.fh8S3ocN9vF7orCENvYk-eD1bCFXBkhvFVOpaE32q3o';
    
    let client;
    let myUser = null;
    const targetUser = new URLSearchParams(window.location.search).get('to');

    function updateLog(text, err = false) {
        const s = document.getElementById('status-bar');
        s.innerText = "> " + text;
        s.style.color = err ? "#ff4444" : "#00ff00";
    }

    async function runSetup() {
        updateLog("Connecting...");
        try {
            client = supabase.createClient(url, key);
            
            const { data: { session } } = await client.auth.getSession();
            
            if (!session) {
                updateLog("ERROR: Login required", true);
                document.getElementById('loading-text').innerText = "Please log in to chat.";
                return;
            }

            myUser = session.user.id;
            updateLog("Handshake OK.");

            // Get profile of person you are chatting with
            const { data: p } = await client.from('profiles').select('username').eq('id', targetUser).single();
            if (p) document.getElementById('chat-target').innerText = "CHAT: " + p.username.toUpperCase();

            // Set up button actions
            document.getElementById('send-btn').onclick = send;
            document.getElementById('message-input').onkeydown = (e) => { if(e.key === 'Enter') send(); };

            // Start message loop
            getMsgs();
            setInterval(getMsgs, 3000);

        } catch (e) {
            updateLog("CRITICAL: " + e.message, true);
        }
    }

    async function getMsgs() {
        const { data, error } = await client
            .from('messages')
            .select('*')
            .or(`and(sender_id.eq.${myUser},receiver_id.eq.${targetUser}),and(sender_id.eq.${targetUser},receiver_id.eq.${myUser})`)
            .order('created_at', { ascending: true });

        if (error) {
            updateLog("SYNC ERROR", true);
            return;
        }

        const box = document.getElementById('chat-box');
        if (data && data.length > 0) {
            box.innerHTML = data.map(m => `
                <div class="msg ${m.sender_id === myUser ? 'sent' : 'received'}">
                    ${m.content}
                </div>
            `).join('');
            box.scrollTop = box.scrollHeight;
        } else {
            box.innerHTML = '<div style="text-align:center; color:#888; font-size:12px; margin-top:20px;">No messages.</div>';
        }
        updateLog("Sync active.");
    }

    async function send() {
        const input = document.getElementById('message-input');
        const val = input.value.trim();
        if (!val) return;

        input.value = '';
        updateLog("Sending...");
        
        const { error } = await client.from('messages').insert([
            { sender_id: myUser, receiver_id: targetUser, content: val }
        ]);

        if (error) {
            updateLog("FAILED", true);
            alert(error.message);
        } else {
            getMsgs();
            updateLog("Sent.");
        }
    }

    runSetup();
</script>
</body>
</html>
