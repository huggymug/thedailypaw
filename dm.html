<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Daily Paw | Messenger</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --win-gray: #d4d0c8; --win-blue: #000080; }
        body { background: #3b3b3b; color: white; font-family: "Segoe UI", Arial; margin: 0; padding: 20px; }
        
        .win-window { 
            background: var(--win-gray); color: black; 
            border: 2px solid #fff; border-right: 2px solid #404040; 
            border-bottom: 2px solid #404040; 
            max-width: 500px; margin: auto; display: flex; flex-direction: column;
        }
        
        .win-title { background: var(--win-blue); color: white; padding: 4px; font-weight: bold; display: flex; justify-content: space-between; }
        
        #chat-box { 
            height: 300px; background: white; margin: 10px; 
            border: 2px inset #fff; overflow-y: auto; padding: 10px;
            display: flex; flex-direction: column; gap: 8px;
        }

        .msg { padding: 6px 10px; border-radius: 4px; max-width: 80%; font-size: 14px; line-height: 1.4; }
        .sent { background: #dcf8c6; align-self: flex-end; border: 1px solid #999; }
        .received { background: #eee; align-self: flex-start; border: 1px solid #ccc; }

        .input-area { padding: 10px; display: flex; gap: 5px; background: var(--win-gray); border-top: 1px solid #808080; }
        input { flex: 1; padding: 5px; border: 2px inset #fff; }
        button { padding: 5px 15px; background: var(--win-gray); border: 2px solid #fff; border-right: 2px solid #404040; border-bottom: 2px solid #404040; cursor: pointer; font-weight: bold; }
        
        #status-bar { background: var(--win-gray); font-size: 11px; padding: 2px 10px; border-top: 1px solid #808080; }
    </style>
</head>
<body>

<div class="win-window">
    <div class="win-title">
        <span id="chat-target">Messenger.exe</span>
        <button onclick="window.location.href='index.html'" style="height:14px; line-height:10px; font-size:9px; background:var(--win-gray); border:1px solid #fff;">X</button>
    </div>

    <div id="chat-box">
        <div style="text-align:center; color:#888; font-size:12px; margin-top:100px;">Establishing secure link...</div>
    </div>

    <div class="input-area">
        <input type="text" id="message-input" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">SEND</button>
    </div>

    <div id="status-bar">System: Ready</div>
</div>

<script>
    const SB_URL = 'https://wemdedhwtlirdevkplch.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndlbWRlZGh3dGxpcmRldmtwbGNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMzE5MTgsImV4cCI6MjA5MjcwNzkxOH0.fh8S3ocN9vF7orCENvYk-eD1bCFXBkhvFVOpaE32q3o';
    
    const _supabase = supabase.createClient(SB_URL, SB_KEY);
    const urlParams = new URLSearchParams(window.location.search);
    const receiverId = urlParams.get('to');
    let myId = null;

    async function init() {
        // 1. Get Session[cite: 1]
        const { data: { session } } = await _supabase.auth.getSession();
        if (!session) {
            document.getElementById('chat-box').innerHTML = '<div style="color:red; text-align:center; padding:20px;">ERROR: You must be logged in to use DMs.</div>';
            return;
        }
        myId = session.user.id;

        // 2. Get target name[cite: 1]
        const { data: profile } = await _supabase.from('profiles').select('username').eq('id', receiverId).single();
        if (profile) {
            document.getElementById('chat-target').innerText = `Direct Message: ${profile.username}`;
        }

        // 3. Start Sync
        loadMessages();
        setInterval(loadMessages, 3000); // Polling every 3 seconds
    }

    async function loadMessages() {
        try {
            // Complex filter to get conversation between TWO specific people[cite: 1]
            const { data, error } = await _supabase
                .from('messages')
                .select('*')
                .or(`and(sender_id.eq.${myId},receiver_id.eq.${receiverId}),and(sender_id.eq.${receiverId},receiver_id.eq.${myId})`)
                .order('created_at', { ascending: true });

            if (error) {
                if (error.code === '401' || error.status === 401) {
                    document.getElementById('status-bar').innerText = "System: 401 Unauthorized (Check RLS Policies)";
                }
                return;
            }

            const box = document.getElementById('chat-box');
            if (!data || data.length === 0) {
                box.innerHTML = '<div style="text-align:center; color:#888; font-size:12px; margin-top:20px;">No messages yet. Say hi!</div>';
                return;
            }

            // Map messages safely to avoid null errors[cite: 1]
            box.innerHTML = data.map(m => `
                <div class="msg ${m.sender_id === myId ? 'sent' : 'received'}">
                    ${m.content}
                </div>
            `).join('');
            
            box.scrollTop = box.scrollHeight;
            document.getElementById('status-bar').innerText = "System: Connected";
        } catch (err) {
            console.error("Fatal Load Error:", err);
        }
    }

    async function sendMessage() {
        const input = document.getElementById('message-input');
        const content = input.value.trim();
        
        if (!content) return;

        input.value = ''; // Clear early for speed

        const { error } = await _supabase.from('messages').insert([
            { sender_id: myId, receiver_id: receiverId, content: content }
        ]);[cite: 1]

        if (error) {
            alert("Send Failed: " + error.message);
        } else {
            loadMessages(); // Refresh immediately
        }
    }

    init();
</script>
</body>
</html>
