<!DOCTYPE html>
<html>
<head>
    <title>Huggymug Productions | News Editor v9</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --win-gray: #d4d0c8; --win-blue: #000080; }
        body { background-color: #3b3b3b; color: white; font-family: "Segoe UI", Arial; margin: 20px; display: grid; grid-template-columns: 450px 1fr; gap: 20px; }
        #editor { background: var(--win-gray); color: black; padding: 15px; border: 2px solid #fff; border-right: 2px solid #404040; border-bottom: 2px solid #404040; height: fit-content; }
        .win-title { background: var(--win-blue); color: white; padding: 5px; font-weight: bold; display: flex; justify-content: space-between; font-size: 0.8rem; }
        .field { margin-bottom: 12px; }
        label { display: block; font-weight: bold; font-size: 0.85rem; margin-bottom: 2px; }
        input, textarea { width: 95%; padding: 4px; border: 2px inset #fff; background: white; font-family: "Courier New", monospace; }
        .export-btn { width: 100%; padding: 10px; margin-top: 5px; background: #2ecc71; color: white; border: 2px solid #fff; border-right: 2px solid #404040; border-bottom: 2px solid #404040; cursor: pointer; font-weight: bold; }
        #debug-log { background: black; color: #00ff00; font-family: monospace; font-size: 0.75rem; padding: 10px; margin-top: 10px; height: 80px; overflow-y: auto; border: 2px inset #fff; }
    </style>
</head>
<body>

<div id="editor">
    <div class="win-title">
        <span>[ HUGGYMUG_ADMIN_CONSOLE.EXE ]</span>
        <span style="color: #00ff00;">[ UNLOCKED ]</span>
    </div>
    
    <div class="field" style="margin-top:10px;">
        <label>Date of Report:</label>
        <input type="text" id="reportDate" value="April 25, 2026">
    </div>

    <div class="field">
        <label>Article Headline:</label>
        <input type="text" id="headline" placeholder="Headline...">
    </div>

    <div class="field">
        <label>Image Filename:</label>
        <input type="text" id="imgSrc" placeholder="icon.png">
    </div>

    <div class="field">
        <label>Article Content:</label>
        <textarea id="bodyText" rows="10" oninput="updatePreview()"></textarea>
    </div>

    <button class="export-btn" onclick="publishToWeb()">🌐 PUBLISH TO ARCHIVES</button>
    <div id="debug-log">> Ready for broadcast.</div>
</div>

<div id="preview-container" style="background:#808080; padding:20px; border:2px solid #000;">
    <iframe id="preview" style="width:100%; height:90vh; background:white; border:none;"></iframe>
</div>

<script>
    const _supabase = supabase.createClient('https://wemdedhwtlirdevkplch.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndlbWRlZGh3dGxpcmRldmtwbGNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMzE5MTgsImV4cCI6MjA5MjcwNzkxOH0.fh8S3ocN9vF7orCENvYk-eD1bCFXBkhvFVOpaE32q3o');

    function log(msg, isError = false) {
        const logger = document.getElementById('debug-log');
        logger.innerHTML = `> <span style="color:${isError ? '#ff5555' : '#00ff00'}">${msg}</span><br>` + logger.innerHTML;
    }

    function updatePreview() {
        const head = document.getElementById('headline').value;
        const body = document.getElementById('bodyText').value;
        const img = document.getElementById('imgSrc').value;
        const date = document.getElementById('reportDate').value;

        document.getElementById('preview').srcdoc = `<html><body style="font-family:serif;padding:20px;"><div style="max-width:500px;margin:auto;border:1px solid #ccc;padding:20px;box-shadow:5px 5px 0 #000;"><small>${date}</small><h1>${head}</h1><img src="${img}" style="width:100%;border:1px solid #000;"><p style="white-space:pre-wrap;">${body}</p></div></body></html>`;
    }

    async function publishToWeb() {
        log("Uploading...");
        const { error } = await _supabase.from('articles').insert([{ 
            title: document.getElementById('headline').value,
            content: document.getElementById('bodyText').value,
            date: document.getElementById('reportDate').value,
            image_url: document.getElementById('imgSrc').value,
            is_admin_post: true 
        }]);
        if (error) log(error.message, true);
        else log("Article Published!");
    }
    updatePreview();
</script>
</body>
</html>
