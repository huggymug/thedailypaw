<!DOCTYPE html>
<html>
<head>
    <title>Huggymug Productions | News Editor v5</title>
    <style>
        :root {
            --win-gray: #d4d0c8;
            --win-blue: #000080;
        }

        body {
            background-color: #3b3b3b;
            color: white;
            font-family: "Segoe UI", Arial, sans-serif;
            margin: 20px;
            display: grid;
            grid-template-columns: 450px 1fr;
            gap: 20px;
        }

        #editor {
            background: var(--win-gray);
            color: black;
            padding: 15px;
            border: 2px solid #fff;
            border-right: 2px solid #404040;
            border-bottom: 2px solid #404040;
            height: fit-content;
        }

        .win-title { 
            margin-top: 0; 
            font-size: 1.1rem; 
            background: var(--win-blue); 
            color: white; 
            padding: 5px; 
        }

        .field { margin-bottom: 12px; }
        label { display: block; font-weight: bold; font-size: 0.85rem; margin-bottom: 3px; }
        
        input, textarea { 
            width: 94%; 
            padding: 4px; 
            border: 2px solid #404040; 
            background: white; 
            font-family: "Courier New", monospace; 
        }

        /* Formatting Toolbar */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 2px;
            background: #808080;
            padding: 2px;
            border: 1px solid #404040;
            margin-bottom: 2px;
        }

        .tool-btn {
            padding: 2px 8px;
            background: var(--win-gray);
            border: 1px solid #fff;
            border-right: 1px solid #404040;
            border-bottom: 1px solid #404040;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .tool-btn:active {
            border: 1px solid #404040;
            border-right: 1px solid #fff;
            border-bottom: 1px solid #fff;
        }

        .export-btn {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: var(--win-gray);
            border: 2px solid #fff;
            border-right: 2px solid #404040;
            border-bottom: 2px solid #404040;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="editor">
    <div class="win-title">[ HUGGYMUG_NEWS_EDITOR.EXE ]</div>
    
    <div class="field" style="margin-top:10px;">
        <label>Date:</label>
        <input type="text" id="reportDate" value="4/25/2026" oninput="updatePreview()">
    </div>

    <div class="field">
        <label>Headline:</label>
        <input type="text" id="headline" value="Local Icon Nova Spotted in Rare Moment of Stillness" oninput="updatePreview()">
    </div>

    <div class="field">
        <label>Image Filename:</label>
        <input type="text" id="imgSrc" value="FIELAPHOTOS.png" oninput="updatePreview()">
    </div>

    <div class="field">
        <label>Article Content:</label>
        <div class="toolbar">
            <button class="tool-btn" onclick="formatText('b')">B</button>
            <button class="tool-btn" onclick="formatText('i')">I</button>
            <button class="tool-btn" onclick="formatText('s')">S</button>
            <button class="tool-btn" onclick="insertTag('<br>')">Line</button>
            <button class="tool-btn" onclick="insertTag('&nbsp;&nbsp;&nbsp;&nbsp;')">Tab</button>
        </div>
        <textarea id="bodyText" rows="12" oninput="updatePreview()">Nova, the strikingly patterned calico known for her piercing green eyes and independent spirit, has once again captured the attention of her household.</textarea>
    </div>

    <button class="export-btn" onclick="downloadHTML()">💾 SAVE FORMATTED ARTICLE</button>
</div>

<div id="preview-container" style="background:#808080; padding:20px; border:2px solid #000;">
    <iframe id="preview" style="width:100%; height:90vh; background:white; border:none;"></iframe>
</div>

<script>
    function formatText(tag) {
        const area = document.getElementById('bodyText');
        const start = area.selectionStart;
        const end = area.selectionEnd;
        const text = area.value;
        area.value = text.substring(0, start) + `<${tag}>` + text.substring(start, end) + `</${tag}>` + text.substring(end);
        updatePreview();
    }

    function insertTag(tag) {
        const area = document.getElementById('bodyText');
        const start = area.selectionStart;
        const end = area.selectionEnd;
        area.value = area.value.substring(0, start) + tag + area.value.substring(end);
        updatePreview();
    }

    function generateFullHTML() {
        const date = document.getElementById('reportDate').value;
        const head = document.getElementById('headline').value;
        const body = document.getElementById('bodyText').value;
        const img = document.getElementById('imgSrc').value;

        return `<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Georgia', serif; line-height: 1.6; color: #2c3e50; margin: 0; padding: 20px; background: #f4f4f4; }
        .paper { max-width: 600px; margin: auto; background: white; padding: 40px; border: 1px solid #ccc; box-shadow: 10px 10px 0px #000; }
        h1 { font-size: 2.5rem; border-bottom: 3px solid black; padding-bottom: 10px; margin-top: 0; }
        .meta { font-family: sans-serif; font-size: 0.8rem; text-transform: uppercase; color: #666; margin-bottom: 20px; }
        img { width: 100%; height: auto; border: 1px solid #000; }
        .dropcap { float: left; font-size: 4rem; line-height: 0.8; padding: 4px 8px 0 0; color: #c0392b; }
    </style>
</head>
<body>
    <div class="paper">
        <div class="meta">Breaking News | ${date}</div>
        <h1>${head}</h1>
        <div class="meta">By The Daily Paw Correspondent</div>
        <img src="${img}">
        <p><span class="dropcap">${body.charAt(0)}</span>${body.substring(1)}</p>
    </div>
</body>
</html>`;
    }

    function updatePreview() {
        const frame = document.getElementById('preview');
        const code = generateFullHTML();
        const blob = new Blob([code], {type: 'text/html'});
        frame.src = URL.createObjectURL(blob);
    }

    function downloadHTML() {
        const code = generateFullHTML();
        const blob = new Blob([code], {type: 'text/html'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'news_article.html';
        a.click();
    }

    updatePreview();
</script>

</body>
</html>
