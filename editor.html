<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --win-gray: #d4d0c8; --win-blue: #000080; }
        body { background: #3b3b3b; color: white; font-family: "Segoe UI", Arial; margin: 0; padding: 10px; }
        .win-window { background: var(--win-gray); color: black; border: 2px solid #fff; border-right: 2px solid #404040; border-bottom: 2px solid #404040; padding: 15px; max-width: 500px; margin: auto; }
        .win-title { background: var(--win-blue); color: white; padding: 5px; font-weight: bold; margin-bottom: 10px; }
        input, textarea { width: 95%; padding: 5px; margin-bottom: 10px; border: 2px inset #fff; }
        .win-btn { padding: 8px 15px; background: var(--win-gray); border: 2px solid #fff; border-right: 2px solid #404040; border-bottom: 2px solid #404040; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
<div class="win-window">
    <div class="win-title">[ NEWS_EDITOR.EXE ]</div>
    <a href="index.html" class="win-btn" style="margin-bottom:10px; display:inline-block;">< BACK</a>
    <input type="text" id="headline" placeholder="Headline">
    <textarea id="bodyText" rows="10" placeholder="Content..."></textarea>
    <input type="file" id="fileInput" accept="image/*">
    <input type="hidden" id="imgSrc">
    <button class="win-btn" style="width:100%; background:#2ecc71; color:white;" onclick="publish()">PUBLISH</button>
    <div id="status" style="font-family:monospace; margin-top:10px; font-size:0.8rem;">Ready.</div>
</div>
<script>
    const _supabase = supabase.createClient('https://wemdedhwtlirdevkplch.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndlbWRlZGh3dGxpcmRldmtwbGNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMzE5MTgsImV4cCI6MjA5MjcwNzkxOH0.fh8S3ocN9vF7orCENvYk-eD1bCFXBkhvFVOpaE32q3o');
    document.getElementById('fileInput').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        document.getElementById('status').innerText = "Uploading...";
        const name = `${Date.now()}_${file.name}`;
        await _supabase.storage.from('article-images').upload(name, file);
        const { data } = _supabase.storage.from('article-images').getPublicUrl(name);
        document.getElementById('imgSrc').value = data.publicUrl;
        document.getElementById('status').innerText = "Photo Ready!";
    };
    async function publish() {
        const { data: { user } } = await _supabase.auth.getUser();
        if (!user) { alert("Log in first!"); return; }
        const { error } = await _supabase.from('articles').insert([{
            title: document.getElementById('headline').value,
            content: document.getElementById('bodyText').value,
            image_url: document.getElementById('imgSrc').value,
            user_id: user.id,
            date: new Date().toLocaleDateString()
        }]);
        if (error) alert(error.message);
        else window.location.href = "index.html";
    }
</script>
</body>
</html>
